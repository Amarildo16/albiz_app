{% load static i18n %}
{% get_current_language as CURRENT_LANGUAGE %}
<header id="page-topbar">
    <div class="layout-width">
        <div class="navbar-header">
            <div class="d-flex align-items-center">
                <div class="navbar-brand-box horizontal-logo">
                    <a href="{% url 'analytics:dashboard' %}" class="logo logo-dark">
                        <span class="logo-sm">
                            <span class="avatar-xxs rounded bg-primary text-white d-inline-flex align-items-center justify-content-center fw-semibold">A</span>
                        </span>
                        <span class="logo-lg">
                            <span class="fw-semibold fs-18 text-dark">Albiz</span>
                        </span>
                    </a>
                    <a href="{% url 'analytics:dashboard' %}" class="logo logo-light">
                        <span class="logo-sm">
                            <span class="avatar-xxs rounded bg-light text-primary d-inline-flex align-items-center justify-content-center fw-semibold">A</span>
                        </span>
                        <span class="logo-lg">
                            <span class="fw-semibold fs-18 text-white">Albiz</span>
                        </span>
                    </a>
                </div>

                <button type="button" class="btn btn-sm px-3 fs-16 header-item vertical-menu-btn topnav-hamburger" id="topnav-hamburger-icon" aria-label="{% trans 'Toggle navigation' %}">
                    <span class="hamburger-icon">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </button>

                <div class="d-none d-md-block ms-2">
                    <h5 class="mb-0 fs-16 fw-semibold">{% trans 'Albiz Analytics' %}</h5>
                </div>
            </div>

            <div class="d-flex align-items-center">
                <div class="dropdown me-1">
                    <button class="btn btn-icon btn-topbar btn-ghost-secondary rounded-circle" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="{% trans 'Change language' %}">
                        <span class="fw-semibold fs-13">{{ CURRENT_LANGUAGE|upper }}</span>
                    </button>
                    <div class="dropdown-menu dropdown-menu-end">
                        <form action="{% url 'set_language' %}" method="post">
                            {% csrf_token %}
                            <input name="next" type="hidden" value="{{ request.get_full_path }}">
                            <button type="submit" name="language" value="en" class="dropdown-item{% if CURRENT_LANGUAGE == 'en' %} active{% endif %}">
                                {% trans 'English' %}
                            </button>
                            <button type="submit" name="language" value="sq" class="dropdown-item{% if CURRENT_LANGUAGE == 'sq' %} active{% endif %}">
                                {% trans 'Shqip' %}
                            </button>
                        </form>
                    </div>
                </div>
                <button type="button" class="btn btn-icon btn-topbar btn-ghost-secondary rounded-circle light-dark-mode" aria-label="{% trans 'Toggle color mode' %}">
                    <i class="bx bx-moon fs-22"></i>
                </button>
                {% if request.user.is_authenticated %}
                    <div class="dropdown ms-1">
                        <button class="btn btn-topbar btn-ghost-secondary rounded-circle" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="{% trans 'User menu' %}">
                            <i class="ri-user-line fs-20"></i>
                        </button>
                        <div class="dropdown-menu dropdown-menu-end">
                            <div class="dropdown-header">
                                <h6 class="mb-0">{{ request.user.get_username }}</h6>
                                {% if request.user.email %}
                                    <small class="text-muted">{{ request.user.email }}</small>
                                {% endif %}
                            </div>
                            <div class="dropdown-divider"></div>
                            <form action="{% url 'logout' %}" method="post">
                                {% csrf_token %}
                                <button type="submit" class="dropdown-item">
                                    <i class="ri-logout-box-r-line align-bottom me-1"></i>
                                    {% trans 'Logout' %}
                                </button>
                            </form>
                        </div>
                    </div>
                {% endif %}
            </div>
        </div>
    </div>
</header>

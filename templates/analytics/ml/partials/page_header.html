{% load i18n %}
<div class="row mb-4">
    <div class="col-12">
        <div class="page-title-box d-sm-flex align-items-center justify-content-between">
            <div>
                <h4 class="mb-sm-0">{{ title }}</h4>
                <p class="text-muted mb-0 mt-1">{{ subtitle }}</p>
            </div>
            <div class="page-title-right">
                <ol class="breadcrumb m-0">
                    <li class="breadcrumb-item"><a href="{% url 'analytics:dashboard' %}">{% trans 'Dashboard' %}</a></li>
                    <li class="breadcrumb-item"><a href="{% url 'analytics:ml_overview' %}">{% trans 'ML Results' %}</a></li>
                    <li class="breadcrumb-item active">{{ crumb|default:title }}</li>
                </ol>
            </div>
        </div>
    </div>
</div>

<div class="table-responsive">
    <table class="table table-sm table-hover align-middle mb-0">
        <thead class="table-light">
            <tr><th>Field</th><th>Column</th><th>Missing</th><th>Rate</th></tr>
        </thead>
        <tbody>
            {% for row in rows %}
                <tr>
                    <td>{{ row.label }}</td>
                    <td><code>{{ row.column }}</code></td>
                    <td>{{ row.missing.display }}</td>
                    <td>{{ row.missing_rate.display }}</td>
                </tr>
            {% empty %}
                <tr><td colspan="4" class="text-muted">No missingness metrics available.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>

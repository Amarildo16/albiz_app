{% load i18n %}
<div class="table-responsive">
    <table class="table table-sm table-hover align-middle mb-0">
        <thead class="table-light">
            <tr><th>{% trans 'Field' %}</th><th>{% trans 'Column' %}</th><th>{% trans 'Missing' %}</th><th>{% trans 'Rate' %}</th></tr>
        </thead>
        <tbody>
            {% for row in rows %}
                <tr>
                    <td>{{ row.label }}</td>
                    <td><code>{{ row.column }}</code></td>
                    <td>{{ row.missing.display }}</td>
                    <td>{{ row.missing_rate.display }}</td>
                </tr>
            {% empty %}
                <tr><td colspan="4" class="text-muted">{% trans 'No missingness metrics available.' %}</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>

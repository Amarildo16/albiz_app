<div class="table-responsive">
    <table class="table table-sm table-hover align-middle mb-0">
        <thead class="table-light">
            <tr><th>Value</th><th>Count</th><th>Share</th></tr>
        </thead>
        <tbody>
            {% for item in distribution.items %}
                <tr>
                    <td>{{ item.label }}</td>
                    <td>{{ item.count.display }}</td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div class="progress flex-grow-1" style="height: 6px;">
                                <div class="progress-bar bg-primary" style="width: {{ item.percent_for_bar }}%;"></div>
                            </div>
                            <span class="text-muted">{{ item.rate.display }}</span>
                        </div>
                    </td>
                </tr>
            {% empty %}
                <tr><td colspan="3" class="text-muted">{{ empty_label }}</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
